<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$ Recorder</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
  height:100vh;
  display:flex;
  flex-direction:column;
}
header {
  height:60px;
  text-align:center;
  padding:5px;
  flex-shrink:0;
}
header h1 { margin:0; }
header span { color:gray; font-size:14px; }
.container {
  display:flex;
  width:100%;
  flex:1;
}
.page {
  width:100%;
  display:flex;
  flex-direction:column;
}
#datePicker {
  margin:15px auto;
  padding:6px;
  font-size:14px;
}
.table-wrap {
  overflow-y:auto;
  flex:0 0 auto;
}
table {
  width:100%;
  background:white;
  border-radius:8px;
  border-collapse:collapse;
}
td,th {
  padding:8px;
  font-size:14px;
  border-bottom:1px solid #ddd;
}
.amount-sub { font-size:11px; color:gray; }
.residual { font-size:11px; color:gray; }
.total-row { font-weight:bold; background:#fafafa; }

.buttons {
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:repeat(4,auto);
  gap:8px;
  padding:10px 0;
}
.btn {
  padding:10px;
  border:none;
  border-radius:10px;
  font-size:14px;
  font-weight:bold;
  color:white;
}
.pink{background:#ff7eb3;}
.orange{background:#ff9a3c;}
.blue{background:#4da6ff;}
.green{background:#4cd964;}
.teal{background:#20c997;}
.lightgreen{background:#8fd19e;}
.delete-btn{background:#999;}
.gray-btn{background:#ccc;color:white;}
</style>
</head>

<body>
<header>
<h1>$ Recorder</h1>
<span id="time"></span>
</header>

<div class="container">

<div class="page">
<input type="date" id="datePicker">

<div class="table-wrap">
<table>
<thead>
<tr><th>Type</th><th>Day TOTAL</th><th>Month TOTAL</th></tr>
</thead>
<tbody id="recordTable"></tbody>
</table>
</div>

<div class="buttons">
<button class="btn pink" data-type="Courses">Courses</button>
<button class="btn orange" data-type="Indulgence">Indulgence</button>
<button class="btn blue" data-type="Essentials">Essentials</button>
<button class="btn green" data-type="Moves">Moves</button>

<button class="btn teal" id="sportBtn">Sport</button>
<button class="btn lightgreen" id="restBtn">Rest</button>

<button class="btn delete-btn" id="deleteBtn">Delete</button>
<button class="btn gray-btn" id="exportBtn">Export</button>
</div>

</div>
</div>

<script>
setInterval(()=>time.innerText=new Date().toLocaleString(),1000);

let data=JSON.parse(localStorage.getItem("records"))||{};
const types=["Courses","Indulgence","Essentials","Moves"];
const BASE_DAY=100;
const BASE_MONTH=700;

const datePicker=document.getElementById("datePicker");
datePicker.value=new Date().toISOString().split("T")[0];

function getMonthDays(dateStr){
  const d=new Date(dateStr);
  return new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
}

// ===== 渲染 =====
function renderTable(){
  const key=datePicker.value;
  const dayList=data[key]?.list||[];
  const sport=data[key]?.sport||0;
  const rest=data[key]?.rest||0;

  const table=document.getElementById("recordTable");
  table.innerHTML="";

  const month=new Date(key).getMonth();
  let monthTotals={Courses:0,Indulgence:0,Essentials:0,Moves:0};
  let monthSport=0, monthRest=0;

  for(let k in data){
    let d=new Date(k);
    if(d.getMonth()===month){
      (data[k].list||[]).forEach(i=>monthTotals[i.type]+=i.amount);
      monthSport+=data[k].sport||0;
      monthRest+=data[k].rest||0;
    }
  }

  const monthSum=Object.values(monthTotals).reduce((a,b)=>a+b,0);
  let dayTotal=0;

  types.forEach(type=>{
    const values=dayList.filter(i=>i.type===type).map(i=>i.amount);
    const sum=values.reduce((a,b)=>a+b,0);
    dayTotal+=sum;

    table.innerHTML+=`
    <tr>
      <td>${type}</td>
      <td>${sum}<div class="amount-sub">${values.length?"="+values.join("+"):""}</div></td>
      <td>${monthTotals[type]}</td>
    </tr>`;
  });

  // ===== Sport&Rest 行 =====
  const monthDays=getMonthDays(key);
  const remain = monthDays*2 - (monthSport+monthRest);

  table.innerHTML+=`
  <tr>
    <td>Sport&Rest</td>
    <td>${sport}+${rest}</td>
    <td>${remain}</td>
  </tr>`;

  table.innerHTML+=`
  <tr class="total-row">
    <td>Day TOTAL</td>
    <td>${dayTotal}</td>
    <td>${monthSum}</td>
  </tr>`;
}

// ===== 普通按钮 =====
document.querySelectorAll(".btn").forEach(btn=>{
  btn.onclick=()=>{
    if(btn.id==="deleteBtn"||btn.id==="exportBtn"||btn.id==="sportBtn"||btn.id==="restBtn") return;

    let v=prompt("Enter amount:");
    if(!/^-?\d+$/.test(v)) return;

    const key=datePicker.value;
    if(!data[key]) data[key]={list:[],sport:0,rest:0};

    data[key].list.push({type:btn.dataset.type,amount:Number(v)});
    localStorage.setItem("records",JSON.stringify(data));
    renderTable();
  }
});

// ===== Sport / Rest =====
sportBtn.onclick=()=>{
  const key=datePicker.value;
  if(!data[key]) data[key]={list:[],sport:0,rest:0};
  data[key].sport=1;
  localStorage.setItem("records",JSON.stringify(data));
  renderTable();
};

restBtn.onclick=()=>{
  const key=datePicker.value;
  if(!data[key]) data[key]={list:[],sport:0,rest:0};
  data[key].rest=1;
  localStorage.setItem("records",JSON.stringify(data));
  renderTable();
};

// ===== 删除 =====
deleteBtn.onclick=()=>{
  delete data[datePicker.value];
  localStorage.setItem("records",JSON.stringify(data));
  renderTable();
};

// ===== 导出 =====
exportBtn.onclick=()=>{
  const blob=new Blob([JSON.stringify(data,null,2)]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="records.json";
  a.click();
};

datePicker.onchange=renderTable;

renderTable();
</script>

</body>
</html>
