<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$ Recorder</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #f5f5f5;
  overflow: hidden;
}

/* Header */
header {
  text-align: center;
  padding: 14px;
  background: white;
}

header h1 {
  margin: 0;
  font-size: 26px;
  font-weight: bold;
}

header span {
  font-size: 16px;
  color: gray;
}

/* Slider */
.container {
  display: flex;
  width: 200vw;
  height: calc(100vh - 70px);
  transition: transform 0.35s ease;
}

.page {
  width: 100vw;
  padding: 18px;
  overflow-y: auto;
}

/* Buttons */
.buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.btn {
  padding: 16px;
  border: none;
  border-radius: 14px;
  font-size: 15px;
  font-weight: bold;
  color: white;
}

.pink { background: #ff7eb3; }
.orange { background: #ff9a3c; }
.blue { background: #4da6ff; }
.green { background: #4cd964; }

/* Date */
.date-box {
  margin-top: 16px;
  display: flex;
  justify-content: center;
  gap: 10px;
  align-items: center;
}

input[type="date"] {
  padding: 8px;
  font-size: 14px;
}

.week-display {
  font-size: 14px;
  color: #555;
}

/* Table */
table {
  width: 100%;
  margin-top: 12px;
  background: white;
  border-radius: 10px;
  overflow: hidden;
}

td, th {
  padding: 8px;
  border-bottom: 1px solid #eee;
  text-align: center;
}

.amount-main {
  font-size: 16px;
  font-weight: bold;
}

.amount-sub {
  font-size: 11px;
  color: gray;
}

/* Export */
#exportBtn {
  width: 80%;
  margin: 120px auto;
  display: block;
  padding: 14px;
  font-size: 16px;
  border-radius: 10px;
}
</style>
</head>

<body>

<header>
  <h1>$ Recorder</h1>
  <span id="time"></span>
</header>

<div class="container" id="container">

  <!-- Page 1 -->
  <div class="page">
    <div class="buttons">
      <button class="btn pink" data-type="Courses">Courses</button>
      <button class="btn orange" data-type="Indulgence">Indulgence</button>
      <button class="btn blue" data-type="Essentials">Essentials</button>
      <button class="btn green" data-type="Moves">Moves</button>
    </div>

    <div class="date-box">
      <input type="date" id="datePicker">
      <div class="week-display" id="weekDisplay"></div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Type</th>
          <th>Amount</th>
        </tr>
      </thead>
      <tbody id="recordTable"></tbody>
    </table>
  </div>

  <!-- Page 2 -->
  <div class="page">
    <button id="exportBtn">Export JSON File</button>
  </div>

</div>

<script>
// ===== 时间 =====
function updateTime() {
  document.getElementById("time").innerText =
    new Date().toLocaleString();
}
setInterval(updateTime, 1000);
updateTime();

// ===== 数据 =====
let data = JSON.parse(localStorage.getItem("records")) || {};

// ===== 日期 =====
const datePicker = document.getElementById("datePicker");
const weekDisplay = document.getElementById("weekDisplay");

datePicker.value = new Date().toISOString().split("T")[0];

// ===== 周计算（周一开始）=====
function updateWeek() {
  const date = new Date(datePicker.value);
  let day = date.getDay();
  if (day === 0) day = 7;

  const start = new Date(date);
  start.setDate(date.getDate() - day + 1);

  const end = new Date(start);
  end.setDate(start.getDate() + 6);

  weekDisplay.innerText =
    `${start.toLocaleDateString()} - ${end.toLocaleDateString()}`;
}

// ===== 渲染表格 =====
function renderTable() {
  const table = document.getElementById("recordTable");
  table.innerHTML = "";

  const records = data[datePicker.value] || {};

  Object.keys(records).forEach(type => {
    const values = records[type];
    const sum = values.reduce((a, b) => a + b, 0);
    const formula = values.join("+");

    table.innerHTML += `
      <tr>
        <td>${type}</td>
        <td>
          <div class="amount-main">${sum}</div>
          <div class="amount-sub">=${formula}</div>
        </td>
      </tr>
    `;
  });
}

// ===== 输入 =====
document.querySelectorAll(".btn").forEach(btn => {
  btn.onclick = () => {
    const type = btn.dataset.type;
    const input = prompt(`Enter amount for ${type}:`);

    if (!/^-?\d+$/.test(input)) {
      alert("❌ Only integers allowed");
      return;
    }

    const date = datePicker.value;

    if (!data[date]) data[date] = {};
    if (!data[date][type]) data[date][type] = [];

    data[date][type].push(Number(input));

    localStorage.setItem("records", JSON.stringify(data));
    renderTable();
  };
});

// ===== 日期切换 =====
datePicker.onchange = () => {
  renderTable();
  updateWeek();
};

// ===== 导出 =====
document.getElementById("exportBtn").onclick = () => {
  const blob = new Blob(
    [JSON.stringify(data, null, 2)],
    { type: "application/json" }
  );

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `records-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
};

// ===== 滑动优化（防误触 + 拖动反馈）=====
let startX = 0;
let startY = 0;
let currentX = 0;
let isDragging = false;
let currentPage = 0;

const container = document.getElementById("container");

function start(e) {
  isDragging = true;
  startX = e.touches ? e.touches[0].clientX : e.clientX;
  startY = e.touches ? e.touches[0].clientY : e.clientY;
}

function move(e) {
  if (!isDragging) return;

  currentX = e.touches ? e.touches[0].clientX : e.clientX;
  let dx = currentX - startX;

  container.style.transition = "none";
  container.style.transform =
    `translateX(calc(${-currentPage * 100}vw + ${dx}px))`;
}

function end(e) {
  if (!isDragging) return;
  isDragging = false;

  const endX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
  const endY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;

  const dx = endX - startX;
  const dy = endY - startY;

  if (Math.abs(dx) > 80 && Math.abs(dx) > Math.abs(dy)) {
    if (dx < 0) currentPage = 1;
    if (dx > 0) currentPage = 0;
  }

  container.style.transition = "0.35s";
  container.style.transform = `translateX(-${currentPage * 100}vw)`;
}

document.addEventListener("touchstart", start);
document.addEventListener("touchmove", move);
document.addEventListener("touchend", end);

document.addEventListener("mousedown", start);
document.addEventListener("mousemove", move);
document.addEventListener("mouseup", end);

// 初始化
renderTable();
updateWeek();
</script>

</body>
</html>
