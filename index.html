<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$ Recorder</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #f5f5f5;
  overflow: hidden;
}

/* Header */
header {
  text-align: center;
  padding: 12px;
  background: white;
}

header h1 {
  margin: 0;
  font-size: 24px;
  font-weight: bold;
}

header span {
  font-size: 14px;
  color: gray;
}

/* Slider */
.container {
  display: flex;
  width: 200vw;
  height: calc(100vh - 65px);
  transition: transform 0.3s ease;
}

.page {
  width: 100vw;
  padding: 16px;
  overflow-y: auto;
}

/* Buttons */
.buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.btn {
  padding: 12px;            /* ✅ 再缩小 */
  border: none;
  border-radius: 12px;
  font-size: 14px;
  font-weight: bold;
  color: white;
}

.pink { background: #ff7eb3; }
.orange { background: #ff9a3c; }
.blue { background: #4da6ff; }
.green { background: #4cd964; }

/* Date */
.date-box {
  margin-top: 14px;
  display: flex;
  justify-content: center;
  gap: 8px;
  align-items: center;
}

input[type="date"] {
  padding: 6px;
  font-size: 13px;
}

.week-display {
  font-size: 13px;
  color: #555;
}

/* Table */
table {
  width: 100%;
  margin-top: 10px;
  background: white;
  border-radius: 8px;
  overflow: hidden;
}

td, th {
  padding: 6px;   /* 更紧凑 */
  border-bottom: 1px solid #eee;
  text-align: center;
}

.amount-main {
  font-size: 15px;
  font-weight: bold;
}

.amount-sub {
  font-size: 10px;
  color: gray;
}

.total-row {
  background: #fafafa;
  font-weight: bold;
}

/* Export */
#exportBtn {
  width: 80%;
  margin: 120px auto;
  display: block;
  padding: 12px;
  font-size: 15px;
  border-radius: 10px;
}
</style>
</head>

<body>

<header>
  <h1>$ Recorder</h1>
  <span id="time"></span>
</header>

<div class="container" id="container">

  <!-- Page 1 -->
  <div class="page">
    <div class="buttons">
      <button class="btn pink" data-type="Courses">Courses</button>
      <button class="btn orange" data-type="Indulgence">Indulgence</button>
      <button class="btn blue" data-type="Essentials">Essentials</button>
      <button class="btn green" data-type="Moves">Moves</button>
    </div>

    <div class="date-box">
      <input type="date" id="datePicker">
      <div class="week-display" id="weekDisplay"></div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Type</th>
          <th>Amount</th>
        </tr>
      </thead>
      <tbody id="recordTable"></tbody>
    </table>
  </div>

  <!-- Page 2 -->
  <div class="page">
    <button id="exportBtn">Export JSON File</button>
  </div>

</div>

<script>
// ===== 时间 =====
function updateTime() {
  document.getElementById("time").innerText =
    new Date().toLocaleString();
}
setInterval(updateTime, 1000);
updateTime();

// ===== 数据 =====
let data = JSON.parse(localStorage.getItem("records")) || {};

// ===== DOM =====
const datePicker = document.getElementById("datePicker");
const weekDisplay = document.getElementById("weekDisplay");
const table = document.getElementById("recordTable");

// ===== 标准日期函数（关键修复）=====
function getDateKey(dateObj) {
  return dateObj.toISOString().split("T")[0];
}

// 初始化日期
const today = new Date();
datePicker.value = getDateKey(today);

// ===== 周计算 =====
function updateWeek() {
  const date = new Date(datePicker.value);
  let day = date.getDay();
  if (day === 0) day = 7;

  const start = new Date(date);
  start.setDate(date.getDate() - day + 1);

  const end = new Date(start);
  end.setDate(start.getDate() + 6);

  weekDisplay.innerText =
    `${start.toLocaleDateString()} - ${end.toLocaleDateString()}`;
}

// ===== 渲染表格 =====
function renderTable() {
  table.innerHTML = "";

  const dateKey = datePicker.value;
  const records = data[dateKey] || {};

  let total = 0;

  Object.keys(records).forEach(type => {
    const values = records[type];
    const sum = values.reduce((a, b) => a + b, 0);
    total += sum;

    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${type}</td>
      <td>
        <div class="amount-main">${sum}</div>
        <div class="amount-sub">=${values.join("+")}</div>
      </td>
    `;

    table.appendChild(row);
  });

  // ✅ 总计行
  const totalRow = document.createElement("tr");
  totalRow.className = "total-row";
  totalRow.innerHTML = `
    <td>TOTAL</td>
    <td>${total}</td>
  `;
  table.appendChild(totalRow);
}

// ===== 输入 =====
document.querySelectorAll(".btn").forEach(btn => {
  btn.onclick = () => {
    const type = btn.dataset.type;
    const input = prompt(`Enter amount for ${type}:`);

    if (input === null) return;

    if (!/^-?\d+$/.test(input)) {
      alert("❌ Only integers allowed");
      return;
    }

    const dateKey = datePicker.value;

    if (!data[dateKey]) data[dateKey] = {};
    if (!data[dateKey][type]) data[dateKey][type] = [];

    data[dateKey][type].push(Number(input));

    localStorage.setItem("records", JSON.stringify(data));

    renderTable();
  };
});

// ===== 日期切换 =====
datePicker.onchange = () => {
  updateWeek();
  renderTable();
};

// ===== 导出 =====
document.getElementById("exportBtn").onclick = () => {
  const blob = new Blob(
    [JSON.stringify(data, null, 2)],
    { type: "application/json" }
  );

  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `records-${datePicker.value}.json`;
  a.click();
};

// ===== 滑动 =====
let startX = 0;
let startY = 0;
let currentPage = 0;

const container = document.getElementById("container");

document.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
});

document.addEventListener("touchend", e => {
  const dx = e.changedTouches[0].clientX - startX;
  const dy = e.changedTouches[0].clientY - startY;

  if (Math.abs(dx) > 80 && Math.abs(dx) > Math.abs(dy)) {
    currentPage = dx < 0 ? 1 : 0;
    container.style.transform = `translateX(-${currentPage * 100}vw)`;
  }
});

// 初始化
updateWeek();
renderTable();
</script>

</body>
</html>
