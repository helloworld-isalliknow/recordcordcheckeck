<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$ Recorder</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
  overflow:hidden;
}
header {
  height:60px;
  text-align:center;
  padding:5px;
}
header h1 { margin:0; }
header span { color:gray; font-size:14px; }
.container {
  display:flex;
  width:200%;
  height:calc(100vh - 60px);
  transition:0.3s;
}
.page {
  width:100%;
  height:100%;
  padding:10px;
  box-sizing:border-box;
  display:flex;
  flex-direction: column;
  justify-content: space-between; /* 新增：上下分布，按钮不会被挤出屏幕 */
}
#datePicker {
  margin:5px auto;
  padding:6px;
  font-size:14px;
}
.table-wrap {
  flex:1;
  overflow:auto; /* 修改：第二页滚动可见 */
}
table {
  width:100%;
  background:white;
  border-radius:8px;
  border-collapse:collapse;
}
td,th {
  padding:8px;
  font-size:14px;
  border-bottom:1px solid #ddd;
}
.amount-sub { font-size:11px; color:gray; }
.residual { font-size:11px; color:gray; }
.total-row { font-weight:bold; background:#fafafa; }
.big-table th:nth-child(1), .big-table td:nth-child(1){ width:30%; }
.big-table th:nth-child(2), .big-table td:nth-child(2){ width:70%; }
.buttons {
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:repeat(3,auto);
  gap:8px;
  margin-top:8px;
}
.btn {
  padding:10px;
  border:none;
  border-radius:10px;
  font-size:14px;
  font-weight:bold;
  color:white;
}
.pink{background:#ff7eb3;}
.orange{background:#ff9a3c;}
.blue{background:#4da6ff;}
.green{background:#4cd964;}
.delete-btn{background:#999;}
.gray-btn{background:#ccc;color:white;}
</style>

<!-- PWA 配置 -->
<meta name="theme-color" content="#f5f5f5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="$ Recorder">
<link rel="apple-touch-icon" href="icon1.png">
</head>

<body>
<header>
<h1>$ Recorder</h1>
<span id="time"></span>
</header>

<div class="container" id="container">

<!-- Page1 -->
<div class="page">
<input type="date" id="datePicker">
<div class="table-wrap">
<table>
<thead>
<tr><th>Type</th><th>Day TOTAL</th><th>Month TOTAL</th></tr>
</thead>
<tbody id="recordTable"></tbody>
</table>
</div>

<!-- 移动按钮到页面底部 -->
<div class="buttons">
<button class="btn pink" data-type="Courses">Courses</button>
<button class="btn orange" data-type="Indulgence">Indulgence</button>
<button class="btn blue" data-type="Essentials">Essentials</button>
<button class="btn green" data-type="Moves">Moves</button>
<button class="btn delete-btn" id="deleteBtn">Delete</button>
<button class="btn gray-btn" id="exportBtn">Export</button>
</div>
</div>

<!-- Page2 -->
<div class="page">
<div class="table-wrap">
<table class="big-table">
<thead>
<tr><th>Date</th><th>Day Total</th></tr>
</thead>
<tbody id="summaryTable"></tbody>
</table>
</div>
</div>

</div>

<script>
// 时间显示
setInterval(()=>time.innerText=new Date().toLocaleString(),1000);

// 数据初始化
let data=JSON.parse(localStorage.getItem("records"))||{};
const types=["Courses","Indulgence","Essentials","Moves"];
const BASE_DAY=100;
const BASE_MONTH=700;

const datePicker=document.getElementById("datePicker");
datePicker.value=new Date().toISOString().split("T")[0];

// ===== Page1 表格渲染 =====
function renderTable(){
  const key=datePicker.value;
  const dayList=data[key]||[];
  const table=document.getElementById("recordTable");
  table.innerHTML="";
  const month=new Date(key).getMonth();
  let monthTotals={Courses:0,Indulgence:0,Essentials:0,Moves:0};
  for(let k in data){
    let d=new Date(k);
    if(d.getMonth()===month){
      data[k].forEach(i=>monthTotals[i.type]+=i.amount);
    }
  }
  const monthSum=Object.values(monthTotals).reduce((a,b)=>a+b,0);
  let dayTotal=0;
  types.forEach(type=>{
    const values=dayList.filter(i=>i.type===type).map(i=>i.amount);
    const sum=values.reduce((a,b)=>a+b,0);
    dayTotal+=sum;
    const percent=monthSum?Math.round(monthTotals[type]/monthSum*100):0;
    table.innerHTML+=`
    <tr>
      <td>${type}</td>
      <td>${sum}<div class="amount-sub">${values.length?"="+values.join("+"):""}</div></td>
      <td>${monthTotals[type]}<div class="amount-sub">${percent}%</div></td>
    </tr>`;
  });
  table.innerHTML+=`
  <tr class="total-row">
    <td>Day TOTAL</td>
    <td>${dayTotal}<div class="residual">Residuals=${BASE_DAY-dayTotal}</div></td>
    <td>${monthSum}<div class="residual">Residuals=${BASE_MONTH-monthSum}</div></td>
  </tr>`;
}

// ===== Page2 大表渲染（修复 overflow & tbody 显示） =====
function renderSummary(){
  const table=document.getElementById("summaryTable");
  table.innerHTML="";
  const dates=Object.keys(data)
    .filter(d=>data[d] && data[d].length)
    .sort();
  dates.forEach(date=>{
    let sums={Courses:0,Indulgence:0,Essentials:0,Moves:0};
    data[date].forEach(i=>{ sums[i.type]+=i.amount; });
    const total=Object.values(sums).reduce((a,b)=>a+b,0);
    table.innerHTML+=`
    <tr>
      <td>${date}</td>
      <td>
        ${total}
        <div class="amount-sub">
        =${sums.Courses}+${sums.Indulgence}+${sums.Essentials}+${sums.Moves}
        </div>
      </td>
    </tr>`;
  });
}

// ===== 按钮输入逻辑 =====
document.querySelectorAll(".btn").forEach(btn=>{
  btn.onclick=()=>{
    if(btn.id==="deleteBtn"||btn.id==="exportBtn") return;
    let v=prompt("Enter amount:");
    if(!/^-?\d+$/.test(v)) return;
    const key=datePicker.value;
    if(!data[key]) data[key]=[];
    data[key].push({type:btn.dataset.type,amount:Number(v)});
    localStorage.setItem("records",JSON.stringify(data));
    renderTable();
    renderSummary();
  }
});

deleteBtn.onclick=()=>{
  delete data[datePicker.value];
  localStorage.setItem("records",JSON.stringify(data));
  renderTable();
  renderSummary();
};

exportBtn.onclick=()=>{
  const blob=new Blob([JSON.stringify(data,null,2)]);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="records.json";
  a.click();
};

datePicker.onchange=renderTable;

// 页面滑动
let startX=0,page=0;
document.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
document.addEventListener("touchend",e=>{
  let dx=startX-e.changedTouches[0].clientX;
  if(dx>50) page=1;
  if(dx<-50) page=0;
  container.style.transform=`translateX(-${page*100}%)`;
});

renderTable();
renderSummary();

// ==================== PWA 集成 ====================
const manifest = {
  name: "$ Recorder",
  short_name: "Recorder",
  start_url: "./",
  display: "standalone",
  background_color: "#f5f5f5",
  theme_color: "#f5f5f5",
  icons: [
    { src: "icon1.png", sizes: "512x512", type: "image/png" }
  ]
};
const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
const manifestURL = URL.createObjectURL(manifestBlob);
const link = document.createElement('link');
link.rel = 'manifest';
link.href = manifestURL;
document.head.appendChild(link);

// 内联 Service Worker
if ('serviceWorker' in navigator) {
  const swCode = `
  const CACHE_NAME="recorder-v1";
  const urlsToCache=["./"];
  self.addEventListener("install", e => { e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(urlsToCache))); });
  self.addEventListener("fetch", e => { e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))); });
  `;
  const swBlob = new Blob([swCode], {type:'application/javascript'});
  const swURL = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swURL);
}
</script>

</body>
</html>
