<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$ Recorder</title>

<style>
* { box-sizing: border-box; }
body { margin:0; font-family:-apple-system; background:#f5f5f5; }

/* Header */
header { text-align:center; padding:10px; background:white; }
header h1 { margin:0; font-size:22px; }
header span { font-size:12px; color:gray; }

/* Layout */
.container { display:flex; width:200vw; height:calc(100vh - 60px); transition:.3s; }
.page { width:100vw; padding:14px; overflow:auto; padding-bottom:120px; }

/* 日期选择框 + 当前周 */
.date-box { display:flex; justify-content:center; align-items:center; margin-top:10px; gap:12px; }
.date-btn {
  padding:8px 12px;
  background:white;
  border-radius:8px;
  font-size:14px; 
}
.week-display {
  font-size:14px;
  color:gray;
}

/* 按钮（放在页面下方，但不需要滚动） */
.buttons {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:20px;
}

.btn {
  padding:10px;
  font-size:14px;
  font-weight:bold;
  border:none;
  border-radius:8px;
  color:white;
}

.pink{background:#ff7eb3;}
.orange{background:#ff9a3c;}
.blue{background:#4da6ff;}
.green{background:#4cd964;}

/* Calendar */
.calendar {
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:white;
  padding:10px;
  display:none;
}

.calendar-grid {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
}

.day {
  text-align:center;
  padding:8px 0;
  position:relative;
}

.dot {
  width:6px;
  height:6px;
  background:gold;
  border-radius:50%;
  position:absolute;
  top:2px;
  right:6px;
}

/* 表格 */
table {
  width:100%;
  margin-top:10px;
  background:white;
  border-radius:8px;
  table-layout:fixed;
}

th:nth-child(1), td:nth-child(1) { width:35%; }
th:nth-child(2), td:nth-child(2) { width:65%; }

td,th { padding:5px; text-align:center; font-size:12px; }
.amount-sub { font-size:11px; color:gray; }
.total-row { background:#fafafa; font-weight:bold; }
.residual { font-size:11px; color:gray; }

/* Export */
#exportBtn { width:80%; margin:100px auto; display:block; padding:10px; }

</style>
</head>

<body>

<header>
<h1>$ Recorder</h1>
<span id="time"></span>
</header>

<div class="container" id="container">

<div class="page">
  
  <div class="date-box">
    <div class="date-btn" id="dateBtn"></div>
    <div class="week-display" id="weekDisplay"></div>
  </div>

  <table>
    <thead>
      <tr><th>Type</th><th>Amount</th></tr>
    </thead>
    <tbody id="recordTable"></tbody>
  </table>

  <div class="buttons">
    <button class="btn pink" data-type="Courses">Courses</button>
    <button class="btn orange" data-type="Indulgence">Indulgence</button>
    <button class="btn blue" data-type="Essentials">Essentials</button>
    <button class="btn green" data-type="Moves">Moves</button>
  </div>

</div>

<div class="page">
  <button id="exportBtn">Export JSON</button>
</div>

</div>

<!-- 日历 -->
<div class="calendar" id="calendar">
  <div class="calendar-grid" id="calendarGrid"></div>
</div>

<script>
// ===== 常量 =====
const BASE_VALUE = 100;

// 时间
setInterval(()=>time.innerText=new Date().toLocaleString(),1000);

// 数据
let data = JSON.parse(localStorage.getItem("records")) || {};
let currentDate = new Date();

// 工具
function formatDate(d){ return d.toISOString().split("T")[0]; }

// ===== 更新周显示 =====
function updateWeek(){
  const d = new Date(currentDate);
  let day = d.getDay(); if(day===0) day=7;
  const start = new Date(d); start.setDate(d.getDate()-day+1);
  const end = new Date(start); end.setDate(start.getDate()+6);
  weekDisplay.innerText = `${start.toLocaleDateString()} - ${end.toLocaleDateString()}`;
}

// ===== 表格渲染 =====
function renderTable(){
  const table = document.getElementById("recordTable");
  table.innerHTML = "";

  const list = data[formatDate(currentDate)] || [];

  const types = ["Courses","Indulgence","Essentials","Moves"];
  let total = 0;

  types.forEach(type=>{
    const values = list.filter(i=>i.type===type).map(i=>i.amount);
    const sum = values.reduce((a,b)=>a+b,0);
    total += sum;

    table.innerHTML += `
      <tr>
        <td>${type}</td>
        <td>
          ${sum}
          <div class="amount-sub">${values.length? "="+values.join("+"):""}</div>
        </td>
      </tr>
    `;
  });

  // TOTAL + Residuals（只显示结果）
  const residual = BASE_VALUE - total;
  table.innerHTML += `
    <tr class="total-row">
      <td>TOTAL</td>
      <td>
        ${total}
        <div class="residual">Residuals=${residual}</div>
      </td>
    </tr>
  `;
}

// 输入
document.querySelectorAll(".btn").forEach(btn=>{
  btn.onclick=()=>{
    let v=prompt("Enter amount:");
    if(!/^-?\d+$/.test(v)) return;

    let key = formatDate(currentDate);
    if(!data[key]) data[key]=[];

    data[key].push({type:btn.dataset.type, amount:Number(v)});
    localStorage.setItem("records",JSON.stringify(data));

    renderTable();
    renderCalendar();
  }
});

// 日期按钮
const dateBtn = document.getElementById("dateBtn");
dateBtn.onclick=()=>calendar.style.display="block";

// 日历渲染
function renderCalendar(){
  const grid = document.getElementById("calendarGrid");
  grid.innerHTML="";

  let d = new Date(currentDate.getFullYear(), currentDate.getMonth(),1);
  let m = d.getMonth();

  while(d.getMonth()===m){
    let day=document.createElement("div");
    day.className="day";
    day.innerText=d.getDate();

    let key=formatDate(d);
    if(data[key] && data[key].length){
      let dot=document.createElement("div");
      dot.className="dot";
      day.appendChild(dot);
    }

    day.onclick=(()=>{
      let selected=new Date(d);
      return ()=>{
        currentDate=selected;
        dateBtn.innerText=formatDate(currentDate);
        calendar.style.display="none";
        renderTable();
        updateWeek();
      }
    })();

    grid.appendChild(day);
    d.setDate(d.getDate()+1);
  }
}

// 导出
exportBtn.onclick=()=>{
  let blob=new Blob([JSON.stringify(data,null,2)]);
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="records.json";
  a.click();
};

// 滑动
let startX=0;
document.addEventListener("touchstart",e=>startX=e.touches[0].clientX);
document.addEventListener("touchend",e=>{
  let dx=e.changedTouches[0].clientX-startX;
  if(Math.abs(dx)>80){
    container.style.transform=dx<0?"translateX(-100vw)":"translateX(0)";
  }
});

// 初始化
dateBtn.innerText=formatDate(currentDate);
updateWeek();
renderTable();
renderCalendar();
</script>

</body>
</html>
