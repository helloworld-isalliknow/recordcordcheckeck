<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$ Recorder</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #f5f5f5;
  overflow: hidden;
}

header {
  text-align: center;
  padding: 12px;
  background: white;
}

header h1 {
  margin: 0;
  font-size: 24px;
  font-weight: bold;
}

header span {
  font-size: 14px;
  color: gray;
}

.container {
  display: flex;
  width: 200vw;
  height: calc(100vh - 65px);
  transition: transform 0.3s ease;
}

.page {
  width: 100vw;
  padding: 16px;
  overflow-y: auto;
}

/* 按钮更小 */
.buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.btn {
  padding: 10px;
  border: none;
  border-radius: 10px;
  font-size: 13px;
  font-weight: bold;
  color: white;
}

.pink { background: #ff7eb3; }
.orange { background: #ff9a3c; }
.blue { background: #4da6ff; }
.green { background: #4cd964; }

/* 日期 */
.date-box {
  margin-top: 12px;
  display: flex;
  justify-content: center;
  gap: 8px;
  align-items: center;
}

input[type="date"] {
  padding: 6px;
  font-size: 13px;
}

.week-display {
  font-size: 13px;
  color: #555;
}

/* 表格 */
table {
  width: 100%;
  margin-top: 10px;
  background: white;
  border-radius: 8px;
}

td, th {
  padding: 6px;
  border-bottom: 1px solid #eee;
  text-align: center;
}

.amount-main {
  font-weight: bold;
}

.amount-sub {
  font-size: 10px;
  color: gray;
}

.total-row {
  background: #fafafa;
  font-weight: bold;
}

#exportBtn {
  width: 80%;
  margin: 120px auto;
  display: block;
  padding: 12px;
}
</style>
</head>

<body>

<header>
  <h1>$ Recorder</h1>
  <span id="time"></span>
</header>

<div class="container" id="container">

<div class="page">
  <div class="buttons">
    <button class="btn pink" data-type="Courses">Courses</button>
    <button class="btn orange" data-type="Indulgence">Indulgence</button>
    <button class="btn blue" data-type="Essentials">Essentials</button>
    <button class="btn green" data-type="Moves">Moves</button>
  </div>

  <div class="date-box">
    <input type="date" id="datePicker">
    <div id="weekDisplay"></div>
  </div>

  <table>
    <thead>
      <tr><th>Type</th><th>Amount</th></tr>
    </thead>
    <tbody id="recordTable"></tbody>
  </table>
</div>

<div class="page">
  <button id="exportBtn">Export JSON File</button>
</div>

</div>

<script>
// ===== 时间 =====
setInterval(()=>{
  document.getElementById("time").innerText =
    new Date().toLocaleString();
},1000);

// ===== 数据（新结构）=====
let data = JSON.parse(localStorage.getItem("records")) || {};

// ===== DOM =====
const datePicker = document.getElementById("datePicker");
const table = document.getElementById("recordTable");
const weekDisplay = document.getElementById("weekDisplay");

// ===== 初始化日期 =====
const today = new Date().toISOString().split("T")[0];
datePicker.value = today;

// ===== 周 =====
function updateWeek(){
  const d = new Date(datePicker.value);
  let day = d.getDay();
  if(day===0) day=7;

  const start = new Date(d);
  start.setDate(d.getDate()-day+1);

  const end = new Date(start);
  end.setDate(start.getDate()+6);

  weekDisplay.innerText =
    `${start.toLocaleDateString()} - ${end.toLocaleDateString()}`;
}

// ===== 渲染（核心重写）=====
function renderTable(){
  table.innerHTML = "";

  const list = data[datePicker.value] || [];

  if(list.length === 0){
    table.innerHTML = "<tr><td colspan='2'>No records</td></tr>";
    return;
  }

  // 分组
  const grouped = {};
  list.forEach(item=>{
    if(!grouped[item.type]) grouped[item.type] = [];
    grouped[item.type].push(item.amount);
  });

  let total = 0;

  for(let type in grouped){
    const values = grouped[type];
    const sum = values.reduce((a,b)=>a+b,0);
    total += sum;

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${type}</td>
      <td>
        <div class="amount-main">${sum}</div>
        <div class="amount-sub">=${values.join("+")}</div>
      </td>
    `;
    table.appendChild(tr);
  }

  // 总计
  const totalRow = document.createElement("tr");
  totalRow.className="total-row";
  totalRow.innerHTML = `
    <td>TOTAL</td>
    <td>${total}</td>
  `;
  table.appendChild(totalRow);
}

// ===== 输入（稳定版）=====
document.querySelectorAll(".btn").forEach(btn=>{
  btn.onclick = ()=>{
    const val = prompt("Enter amount:");
    if(val===null) return;

    if(!/^-?\d+$/.test(val)){
      alert("Only numbers");
      return;
    }

    const date = datePicker.value;

    if(!data[date]) data[date] = [];

    data[date].push({
      type: btn.dataset.type,
      amount: Number(val)
    });

    localStorage.setItem("records", JSON.stringify(data));

    renderTable();
  };
});

// 日期切换
datePicker.onchange = ()=>{
  updateWeek();
  renderTable();
};

// 导出
document.getElementById("exportBtn").onclick = ()=>{
  const blob = new Blob([JSON.stringify(data,null,2)]);
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "records.json";
  a.click();
};

// 滑动（简单稳定版）
let startX=0;

document.addEventListener("touchstart",e=>{
  startX = e.touches[0].clientX;
});

document.addEventListener("touchend",e=>{
  let dx = e.changedTouches[0].clientX - startX;
  if(Math.abs(dx)>80){
    document.getElementById("container").style.transform =
      dx<0 ? "translateX(-100vw)" : "translateX(0)";
  }
});

// 初始化
updateWeek();
renderTable();
</script>

</body>
</html>
